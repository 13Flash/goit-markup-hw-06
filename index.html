   <div class="
   modal-overlay" id="modal">
      <div class="modal">
        <button class="modal-close-btn" type="button" aria-label="Close modal">
          <svg class="modal-close-icon" width="8" height="8">
            <use href="./images/icons.svg#icon-close"></use>
          </svg>
        </button>

        <p class="modal-title">Leave your contacts and we will call you back</p>

        <form class="modal-form">
          <div class="modal-field-wrapper">
            <label class="modal-label" for="user-name">Name</label>
            <div class="modal-input-wrapper">
              <input
                class="modal-input"
                type="text"
                name="user-name"
                id="user-name"
                required
              />
              <svg class="modal-input-icon" width="12" height="12">
                <use href="./images/icons.svg#icon-person"></use>
              </svg>
            </div>
          </div>

          <div class="modal-field-wrapper">
            <label class="modal-label" for="user-phone">Phone</label>
            <div class="modal-input-wrapper">
              <input
                class="modal-input"
                type="tel"
                name="user-phone"
                id="user-phone"
                required
              />
              <svg class="modal-input-icon" width="12" height="12">
                <use href="./images/icons.svg#icon-phone"></use>
              </svg>
            </div>
          </div>

          <div class="modal-field-wrapper">
            <label class="modal-label" for="user-email">Email</label>
            <div class="modal-input-wrapper">
              <input
                class="modal-input"
                type="email"
                name="user-email"
                id="user-email"
                required
              />
              <svg class="modal-input-icon" width="12" height="12">
                <use href="./images/icons.svg#icon-email"></use>
              </svg>
            </div>
          </div>

          <div class="modal-field-wrapper comment-field-margin">
            <label class="modal-label" for="user-comment">Comment</label>
            <textarea
              class="modal-textarea"
              name="user-comment"
              id="user-comment"
              placeholder="Text input"
            ></textarea>
          </div>

          <div class="modal-checkbox-wrapper">
            <input
              class="modal-checkbox visually-hidden"
              type="checkbox"
              name="user-privacy"
              id="user-privacy"
              value="true"
              required
            />
            <label class="modal-checkbox-label" for="user-privacy">
              <span class="modal-custom-checkbox">
                <svg class="modal-checkmark-icon" width="10" height="8">
                  <use href="./images/icons.svg#icon-check-mark"></use>
                </svg>
              </span>
              I accept the terms and conditions of the&nbsp;<a
                class="modal-privacy-link"
                href=""
                >Privacy Policy</a
              >
            </label>
          </div>

          <button class="modal-submit-btn" type="submit">Send</button>
        </form>
      </div>
    </div>
